name: Generate Snake

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Vasanthdev2004
          # Authenticate the contribution query. Unauthenticated GraphQL hits a low
          # node limit ("Resource limits for this query exceeded"); the default
          # github.token raises it, and a PAT_TOKEN secret (if set) raises it further.
          github_token: ${{ secrets.PAT_TOKEN || github.token }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.svg?color_snake=#22d3ee&color_dots=#0f172a,#1e3a8a,#2563eb,#22d3ee,#7c3aed

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
