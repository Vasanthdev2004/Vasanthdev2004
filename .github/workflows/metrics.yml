name: Metrics

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          user: Vasanthdev2004
          filename: metrics.svg
          template: classic
          # Only the sections with real signal: identity + activity numbers. The old
          # community/repositories/metadata blocks were all zeros and made the card
          # look sparse. Rich visual plugins replace those empty rows instead.
          base: header, activity
          base_indepth: yes
          config_timezone: Asia/Kolkata
          config_padding: 0, 8 + 11%
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: vasanth.dev@outlook.com, 148849890+Vasanthdev2004@users.noreply.github.com
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile, makefile
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
