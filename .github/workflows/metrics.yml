name: Metrics

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          user: Vasanthdev2004
          filename: metrics.svg
          template: classic
          # PURE VISUAL: no base stats list (that dumped the zeros the user disliked).
          # Just a colorful language bar and coding-habit charts. These queries are
          # light (no full-year calendar), so they avoid the GraphQL node-cost limit.
          base: ""
          config_timezone: Asia/Kolkata
          config_padding: 6, 6
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile, makefile
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_facts: no
