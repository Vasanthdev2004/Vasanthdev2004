<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.45" stop-color="#0F172A"/>
      <stop offset="0.75" stop-color="#102A43"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="200" y1="90" x2="1060" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="blurA" x="-200" y="-200" width="1680" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="glow" x="0" y="0" width="1280" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M0 72H1280" stroke="#334155"/>
    <path d="M0 132H1280" stroke="#334155"/>
    <path d="M0 192H1280" stroke="#334155"/>
    <path d="M0 252H1280" stroke="#334155"/>
    <path d="M0 312H1280" stroke="#334155"/>
    <path d="M96 0V420" stroke="#334155"/>
    <path d="M256 0V420" stroke="#334155"/>
    <path d="M416 0V420" stroke="#334155"/>
    <path d="M576 0V420" stroke="#334155"/>
    <path d="M736 0V420" stroke="#334155"/>
    <path d="M896 0V420" stroke="#334155"/>
    <path d="M1056 0V420" stroke="#334155"/>
    <path d="M1216 0V420" stroke="#334155"/>
  </g>

  <g filter="url(#blurA)" opacity="0.8">
