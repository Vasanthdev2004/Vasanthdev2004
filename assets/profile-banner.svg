  <rect x="58" y="56" width="650" height="276" rx="24" fill="#0F172A" stroke="rgba(148,163,184,0.18)"/>
  <rect x="58" y="56" width="650" height="38" rx="24" fill="#111C31"/>
  <circle cx="90" cy="75" r="6" fill="#F87171"/>
  <circle cx="112" cy="75" r="6" fill="#FBBF24"/>
  <circle cx="134" cy="75" r="6" fill="#34D399"/>
  <text x="168" y="78" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">vasanth.dev / profile</text>

  <text x="90" y="150" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="1.5">VASANTH T</text>
  <text x="92" y="192" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Open Source Builder / Frontend Developer / AI Tooling</text>
  <text x="92" y="228" fill="#93C5FD" font-family="Consolas, Menlo, monospace" font-size="16">shipping features / fixing real bugs / building in public</text>
