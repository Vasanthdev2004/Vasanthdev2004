    </rect>
    <text x="110" y="288" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">OpenClaude Contributor</text>

    <rect x="284" y="266" width="120" height="34" rx="17" fill="rgba(59,130,246,0.12)" stroke="#3B82F6">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4.6s" repeatCount="indefinite"/>
    </rect>
    <text x="314" y="288" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">React / TS</text>

    <rect x="420" y="266" width="160" height="34" rx="17" fill="rgba(168,85,247,0.12)" stroke="#A855F7">
