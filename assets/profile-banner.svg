    <text x="824" y="180" fill="#22D3EE" font-family="Consolas, Menlo, monospace" font-size="15">&gt; open source contributions</text>
    <text x="824" y="208" fill="#60A5FA" font-family="Consolas, Menlo, monospace" font-size="15">&gt; provider UX and AI workflows</text>
    <text x="824" y="236" fill="#C084FC" font-family="Consolas, Menlo, monospace" font-size="15">&gt; frontend polish and dev tools</text>
    <text x="824" y="264" fill="#F8FAFC" font-family="Consolas, Menlo, monospace" font-size="15">&gt; learning fast, shipping faster</text>

    <rect x="824" y="278" width="170" height="2" rx="1" fill="url(#line)">
